body:
  text: 赤松子中誡經序雨十昔公明子皋過宋見大夫薛瑗有子一十人六人僂跛𤼣臂顛癡一子獄死三子盲聾瘖瘂子皋遂問大夫所行之行如何而禍至此薛瑗對曰今蒙先生顧問實以衷腸之事奉告先生予爲國之宰相未曾舉一人不曾接一士見賢如讎約截不令入見人遺失予如有所得見人有得予如有所失恨身不爲之耳𦤎曰大夫所行如此之行須至滅門矣千迍萬病殃及子孫受諸惡報何至如此乎薛瑗聞先生所說神色憂懼心䰟茫然稽首知過寧許改乎子皋語大夫曰天雖髙而察其下行兇惡者必殃行善事者必福改徃修來轉敗爲成不患晚矣吾昔年曾於先生處傳得赤松子誡箴一軸能依此行治身萬病及㧞見世子孫吾今知大夫所作用心從來皆錯子將此誡箴奉傳與大夫但依此而行之必知天之驗也於是開篋取經授與薛瑗瑗拜而捧之𦤎遂辭而去得後數年還來到國見大夫諸子所疾並皆差矣子𦤎見諸子疾愈問大夫曰予别後得何良醫妙術郎君所損諸疾皆痊對曰兒子亦不值良醫别無方術頃年於先生處得中誡經遂改過悛心見人有所失爲之慘然見人有所得内有喜恱舉賢薦能自退禄位巳前所貯金帛錢穀散惠孤貧救濟窮困寬心饒借與物無競齋沐追薦君父不淫服飾不貪美味敬天地信鬼神知足儉約兒子各各自愈子𦤎語大夫曰速哉速哉天之報善也過於響應聲影應形今大夫一心行善男女百病皆差何況行一千餘事乎薛瑗乃將千金拜上子𦤎以酬賜經之恩乞先生見受子𦤎曰予得大夫金亦無用處可自留隂惠施人唯抄此經授與未悟之人便是大夫報恩極也於是先生乃辭大夫而去赤松子中誡經軒轅黄帝稽首問赤松子曰朕見萬民受生何不均匀有富貴有貧賤有長命者有短命者或横罹枷禁或乆病纒身或無病卒亡或長壽有禄如此不等願先生爲朕辯之赤松子曰生民焭焭各載一星有大有小各主人形延促衰盛貧富死生爲善者善氣覆之福德隨之衆邪去之神靈衞之人皆敬之逺其禍矣爲惡之人凶氣覆之災禍隨之吉祥避之惡星照之人皆惡之衰患之事併集其身矣人之朝夕行心用行善惡所爲暗犯天地禁忌謫譴罪累事非一也人之朝夕爲惡人神司命奏上星辰奪其筭壽天氣去之地氣著之故曰衰也黃帝又問曰人生壽命合得幾許對曰人生墮地天賜其壽四萬三千八百日都爲一百二十歳一年主一歳故人受命皆合一百二十歳爲犯天地禁忌奪筭命終又問或有胎中便天或得數歳而亡此既未有施爲犯何禁忌赤松子對曰此乃祖宗之罪遺殃及後自古英賢設教留在仙經皆勸人爲善知其諸惡始乃萬古傳芳子孫有福夫人生在天地之中禀隂陽二氣皇天雖髙其應在下后土雖卑其應在上天不言而四時行地不言而萬物生人處其中恣心情慾凡人動息天地皆知故云天有四知也人不言報天地之恩發言多怨天地天生烝民以乾坤表父母日月表眼目星辰表九竅風動火力爲煖氣壽命終時總還歸土天上三台北辰司命司録差太一直符常在人頭上察其有罪奪其筭壽若奪一年頭上星無光其人坎坷多事奪筭十年星漸破缺其人災衰疾病奪其筭壽二十年星光殞滅其人困篤或遭刑獄奪其筭壽三十年其星流散其人則死時去筭盡不周天年更殃後代子孫子孫流殃不盡以至滅門人不目知過犯只言短壽故天不欺物示之以影晝夜隂陽雷電雨雪虹霓交暈日月薄蝕彗孛飛流天之信也地不欺物示之以響應及生萬物江河流注乃至枯涸山崩地動惡風振木飛沙走石水澇蟲蝗饑荒天旱瘴癘災疫地之信也鬼神不欺物示之以禍福恠異災祥是鬼神之信也國主不欺物示之天地和星辰順災殃滅四方歸萬姓安人君之信也人之所行發言用意莫言天地如此故聖人云皇天無親惟德是輔畏天命畏大人畏聖人之言凡人逐日私行善惡之事天地皆知其情暗殺物命神見其形心口意語鬼聞人聲犯禁滿百鬼收其精犯禁滿千地録人形日行諸惡枷鎻立成此隂陽之報也皇天以誡議故作違犯則鬼神天地禍之也黄帝又問神仙善惡之兆見蒙福祐更可爲朕審而述之赤松子對曰修身制命治性之法清朝常行𠮷氣專心記念善語善行善視一日之内三業不生三年之内天降福星皆爲福報也如人清朝常行惡語惡行惡視教人爲惡日造三年之内禍患及身亡財減口地加妖氣人必衰矣天之九醜是人間之九横夫善者惡之符惡者善之信也又云善人者惡人之師惡人者善人之資𠮷者凶之證凶者𠮷之餘也有善人常遇災衰多般禍患先人之餘殃也故一生修善之人不必擇良時𠮷日凡用使之時自然得凶中之𠮷百靈潜護神煞避矣一生爲惡之人縱㨂得𠮷日良時及至用日却值𠮷中之凶惡神害之福神避矣伹世人終日常修善行自然天增福壽和氣霞光此乃形影之道也欲得不衰不耗與天相保天地禁忌得失修身制命之道今具言之人爲一善神意安定爲十善氣力彊盛爲二十善身無患害爲三十善所求遂意爲四十善般富娱樂爲五十善子孫昌盛爲六十善不遭誤犯惡人牽累爲七十善所學顯貴爲八十善獲地之利爲九十善天神護之爲一百善天賜其禄逢遇聖賢爲二百善揚名後世子孫受禄爲三百善三世子孫富貴利樂爲四百善四世子孫富貴遷禄爲五百善五世子孫受封超爵爲六百善世世子孫忠孝富貴爲七百善世世出賢哲人爲八百善出道德人爲九百善出聖人爲一千善出群仙古跡善政天道所録見身加筭進位登仙福及子孫生賢出聖也若人爲一惡意不安定爲十惡氣力虚羸爲二十惡身多疾病爲三十惡所求不遂爲四十惡坎坷衰耗凡事乖張爲五十惡終無匹偶爲六十惡絶滅子息爲七十惡隂鬼謀害爲八十惡水火爲災非横燒溺爲九十惡貧寒困弱瘡疥風顛爲一百惡天氣害之横事牽引刑法惡死爲二百惡地氣害之盜賊爲災爲三百惡世世出下賤人爲四百惡世世子孫窮賤貧乞爲五百惡子孫絶嗣爲六百惡世世子孫盲聾瘖瘂出癡顛人爲七百惡出五逆不孝犯法子孫爲八百惡出叛臣逆子誅滅親族爲九百惡出妖孽之人夷滅族類爲一千惡世世子孫異形變體爲禽獸不具之狀積惡之殃滿盈禍及數世矣此爲司命奪筭星落身亡䰟拷酆都殃流後世黃帝又問曰司命奪人筭壽世人作何罪所招赤松子對曰伏以世上之人自犯悔咎却言天道不平有屈不自分雪呪詛怒天囚禁枷鎻怒天饑貧疾病怒天寒暑霜雪怒天晝夜短長怒天自爲惡事祈呪於天逆四時違五行對三光躶體赤露便利向三光星辰社廟之前見日月薄蝕不救貪自歡樂不敬天地鬼神不孝父母呵罵風雨毀拆聖人典教破壞社廟穿掘墳墓取亡人財物欺詐盲聾瘖瘂之人𥨸盜金帛將穢汚潑他人屋舍妄外破除衣服以不淨器物盛諸飲食厭呪生人埋符地下妬賢嫉能養諸蠱毒殺害物命遺無頭文狀䜛損平人發覺他人私事閉塞道路填築溝渠偷他人物抛弃用藥斫伐他人𣗳木苗稼花果園林損害六畜穢汚井竈宫觀廟宇自身孝服唱歌作樂放火燒山破除他人産業涸絶池沼捕採水族黿鼉龜魚與人結交違背盟誓輕慢神道姦詐誣罔口是心非惡言䜛闘僻要諍訟教人官事重告躶露對人披髮飲食損善益惡潤已侵人酷信邪師教人非法攻殺無罪執正爲非恃勢邪巧入輕爲重春行殺伐夏誅諸命秋則見惡不改冬則開掘地藏離他人骨肉好殺惡生自重輕人欺孤淩寡敗他成已危他取安借貸不還譽已毀彼和惡逐勢賣弄他權隂毒面慈見殺加怒知過不改見善不從背親向踈慢髙傲下不受父母師友教誨妻妾䜛闘取小下言語輕弃骨肉施恩却悔樂短他人窮懢窺他宻事調謔姦他妻妾非道而行奪人恩愛𥨸他善事自言已有以重罪牽引平人保證輕慢上下不擇尊卑恃酒淩物用物不當抛棄飲食輕賤衣服非分求覔不避危亡得新忘故棄本逐末知恩不報欺誑謾人右所書過犯八百餘件略而言之不可具載但世人有所犯皆犯本照星辰奏聞上帝七星六律四時八風九宫五行先令司命奪筭令人短壽令諸殃禍延及子孫黄帝又問曰人犯天地禁忌奪筭有數人之罪如何赤松子曰人爲天地之本當爲善伏縁世人外貌和柔内懷隂妬觸犯禁忌罪累非一被司命一一録奏應是世人遭刑殺者或兩軍相持陣場死者一爲自身有犯宿業相讎二爲五運相交太一伐之數值遷移之歴運合受磨滅之災殃黄帝又問赤松子曰朕聞先生所說世人違犯卧不安席罪可解乎對曰罪有可解者有不可解者世人偶行非道心能悔過是可解也若聞不信知過不改爲惡轉多心毒熾盛不可解也赤松子曰人行善道天地鬼神賜福助之増延壽考無諸惡事何以不爲善道但世人尊敬天地三光不犯禁忌孝愛父母和順兄弟憐愍孤獨救接貧病敬重師長古來聖賢郷里老人教示不違卑謙恭敬每遇風雨寒熱惡星恠異日月交暈𧇊犯薄蝕皆宜念善敬逺鬼神祭祀天地上録其功増延禄筭見人爲惡觀人修善若遇善人敬而從之或見凶危將心救護自就艱難與人平穩將已輕事替人重役勸人不爲官事口舌爭訟葺理義井溝渠修填道路不以小失其大不以大棄其小見人有所失爲其痛切見人有所得爲之内喜扶羸護弱施恩濟惠孤貧恭謹卑遜讓禄他人天録中功亦増遐壽子孫獲福如有志信不違心崇道德不避危險救溺江湖無淫外色不侵他人屋宅産業不非理損害物命好生惡殺禮敬不虧常習經書恩不忘報惠人不悔寛懷忍辱盡忠盡孝不逞威儀不枉用財物不愛華麗之服修饌食不非分殺命自我作古人無不親無自賢無自善無自解無自富無自矜無自專無自譽無自重無自尊無目大無自用無自可大録下功皆増筭壽又加筭倍多者人能事君盡忠事父盡孝不傲慢敬師長開悟童蒙光讃師傅修身謙讓和睦上下撫愛均平不聽䜛邪直心用行婦人孝順翁婆敬順夫壻清貞潔行飲氣吞聲叅省晨昏和顔恱色無私奉上並蒙加筭延壽増禄災横消除男女聰慧人有折壽薄福者臣弑君子弑父事師違背業成忘師悖亂無禮不識親踈逞恣自我婦人違背父母不孝翁婆輕賤夫壻口舌誹謗闘亂六親盜𥨸嚵慵比鄰爲惡皆奪福壽惡病纒身生遭人憎死墮地獄黄帝又問曰更有人間至妙之道可得聞乎赤松子曰夫人修持善惡自起於心心是五賊之苖萬惡之根夫人之心擬行善善雖未成而善神已應矣心起惡惡雖未萌凶神已知故君子千日行善善由未足片時造惡惡便有餘至如僣奪吞併亦起於心有得有失㑹在天道又有起心害人未必便得乃其死生枯榮亦由運也經云天有五賊見之者昌失之者亡教法五德行之者昌背之者亡行之爲温良恭儉讓仁義禮智信背之爲惡逆貪妬殺兇暴亂欺誑詐佞世人多行五背心常九念見他人家榮貴說他徃日風塵起心願他流貶見人富貴笑他徃日貧窮願他破散見他財帛豐盈起心教人劫奪見他妻妾美麗起心欲作姦非見他屋宅宏壯起心欲擬焚燒欠他債負起心願債主身亡借貸他人財物不得起心懊惱恨多見他偶有危難說他徃日之非自生身父母早願亡殁要財物屋宅此是愚人九念是以天地鬼神惡之賜其殃禍奪其筭壽也心行五德之人常懷九思見他榮貴自思福業縁薄見他榖米盈倉自思不勤力營種見他金玉資財自思非我所有之物見他美色妻妾自思匹偶不生亂心見他屋宅宏壯自思弊陋且安見他舊曽於巳不足遭官府起救接之心欠他債負目下未有還填長思憂負勤償之或欲借貸他人財物自思舊無恩力見他事養君親常思無辛勤酬荅世人能終日行此九思棄前九念爲上智明慧人也見世獲於福祐慶流子孫横禍非災不可及也黄帝又問先生曰智人何等次之對曰有三等皆爲仁者之人上智者明天文察地理不學自曉不教自解黙而識之辯音律鑒賢愚心慈愍不輕人識成敗知進退别存亡此人雖貧而終富暫卑而終髙此上智人也中智者通㑹經書常存禮敬見賢思齊扶危救弱惠施不悔忠孝不虧言不傷物卑遜温謙此未學而終悟雖未顯而終逹此中智人也下智者修善人也改徃修來就業而思學篤信善惡之事不侵他人財物保命惜身㑹道理識文法自能好弱自怕災衰如此兢兢而無過失不遭横禍此下智人也黄帝言曰善哉善哉此言不可數於功德謹依所說録示衆人作大津梁諸群臣稽首而退依教奉行赤松子中誡經終
